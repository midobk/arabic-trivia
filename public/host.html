<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — شاشة المضيف</title>
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎯%3C/text%3E%3C/svg%3E">
</head>
<body>
  <!-- Server-injected QR. Kept OUTSIDE #app so re-renders don't wipe it. -->
  <div id="qr-template" style="display:none">{{QR_SVG}}</div>
  <div id="app"></div>

  <script>
    'use strict';

    // Vercel-static-demo guard: if we detect we're on vercel.app (no Node
    // server behind it), show a "run locally" banner instead of a broken
    // "connecting" screen.
    if (/vercel\.app$/.test(location.hostname)) {
      document.getElementById('app').innerHTML = `
        <div class="connecting" style="flex-direction:column; gap:2rem; text-align:center; padding:6vmin;">
          <div style="font-size:18vmin">📺</div>
          <div style="font-size:5vmin; font-weight:900; color:#fff;">شاشة المضيف</div>
          <div style="font-size:2.4vmin; color:#b6b0d8; max-width:60ch; line-height:1.6;">
            هذه نسخة العرض فقط. اللعب الجماعي متاح عند تشغيل الخادم محلياً (<code style="background:rgba(255,255,255,0.08); padding:0.3rem 0.6rem; border-radius:0.4rem; font-family:ui-monospace,monospace;">npm start</code>) ثم فتح <code style="background:rgba(255,255,255,0.08); padding:0.3rem 0.6rem; border-radius:0.4rem; font-family:ui-monospace,monospace;">/host</code>.
          </div>
          <a href="https://github.com/midobk/arabic-trivia" target="_blank" rel="noopener"
             style="display:inline-block; background:#ffd23f; color:#2d1500; padding:1.5rem 3rem; border-radius:0.8rem; font-weight:800; font-size:2.4vmin; text-decoration:none;">
            الكود على GitHub ↗
          </a>
        </div>`;
      // Don't even try to open a WebSocket.
      throw new Error('demo-mode-vercel');
    }

    // WebSocket scheme follows the page's scheme (wss for https, ws for http)
    const WS_PROTO = location.protocol === 'https:' ? 'wss' : 'ws';

    // ── State (single source of truth on the host client) ───────────────────
    const S = {
      phase: 'connecting',     // connecting | lobby | asking | reveal | leaderboard | end
      code: '{{CODE}}',
      title: '{{TITLE}}',
      subtitle: '{{SUBTITLE}}',
      players: [],             // [{name, score}]
      currentQ: null,          // {index, total, question, choices, duration}
      counts: [0, 0, 0, 0],    // answers per choice (host view)
      correctIndex: -1,
      answeredCount: 0,
      remaining: 0,
      tickInterval: null,
    };

    // ── WebSocket ───────────────────────────────────────────────────────────
    let ws = null;
    function connect() {
      ws = new WebSocket(`${WS_PROTO}://${location.host}`);
      ws.onopen = () => {
        S.phase = S.phase === 'connecting' ? 'lobby' : S.phase;
        send({ type: 'host:hello' });
        render();
      };
      ws.onmessage = (e) => {
        let m; try { m = JSON.parse(e.data); } catch (_) { return; }
        handle(m);
      };
      ws.onclose = () => {
        S.phase = 'connecting';
        render();
        setTimeout(connect, 1200);
      };
    }
    function send(msg) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg)); }

    function handle(m) {
      switch (m.type) {
        case 'host:state': {
          S.code = m.code || S.code;
          S.title = m.title || S.title;
          S.subtitle = m.subtitle || S.subtitle;
          S.players = m.players || [];
          if (m.phase && m.phase !== 'asking' && m.phase !== 'reveal' && m.phase !== 'leaderboard') {
            S.phase = m.phase;
          }
          render();
          break;
        }
        case 'host:error': {
          S.phase = 'host_busy';
          render();
          break;
        }
        case 'player:joined':
        case 'player:left': {
          S.players = m.players || S.players;
          render();
          break;
        }
        case 'question': {
          S.phase = 'asking';
          S.currentQ = m;
          S.counts = new Array(m.choices.length).fill(0);
          S.correctIndex = -1;
          S.answeredCount = 0;
          S.remaining = m.duration;
          startTicker();
          render();
          break;
        }
        case 'tick': {
          S.remaining = m.remaining;
          updateTimer();
          break;
        }
        case 'player:answered': {
          S.answeredCount = m.count;
          // Increment count for the player's choice if we know it.
          // We don't currently send the choice index with the answered event, so we approximate.
          render();
          break;
        }
        case 'reveal': {
          S.phase = 'reveal';
          S.correctIndex = m.correctIndex;
          S.counts = m.counts;
          stopTicker();
          render();
          break;
        }
        case 'leaderboard': {
          S.phase = 'leaderboard';
          S.topPlayers = m.players;
          stopTicker();
          render();
          break;
        }
        case 'game:end': {
          S.phase = 'end';
          S.finalPlayers = m.players;
          stopTicker();
          render();
          break;
        }
      }
    }

    function startTicker() {
      stopTicker();
      S.tickInterval = setInterval(() => {
        S.remaining = Math.max(0, S.remaining - 1);
        updateTimer();
        if (S.remaining <= 0) stopTicker();
      }, 1000);
    }
    function stopTicker() {
      if (S.tickInterval) { clearInterval(S.tickInterval); S.tickInterval = null; }
    }

    // ── Render ──────────────────────────────────────────────────────────────
    const app = document.getElementById('app');

    function render() {
      stopTicker();
      switch (S.phase) {
        case 'connecting': return renderConnecting();
        case 'host_busy':  return renderHostBusy();
        case 'lobby':      return renderLobby();
        case 'asking':     return renderAsking();
        case 'reveal':     return renderAsking({ revealed: true });
        case 'leaderboard':return renderLeaderboard();
        case 'end':        return renderEnd();
      }
    }

    function renderConnecting() {
      app.innerHTML = `<div class="connecting">… جاري الاتصال</div>`;
    }
    function renderHostBusy() {
      app.innerHTML = `
        <div class="host">
          <div class="connecting" style="flex:1; display:flex; flex-direction:column; gap:1.5rem; align-items:center; justify-content:center;">
            <h2 style="font-size:4vmin; margin:0;">شاشة المضيف مشغولة بالفعل</h2>
            <p style="font-size:2.2vmin; max-width:60ch; text-align:center;">
              يبدو أن هناك جلسة أخرى متصلة بالفعل. أغلقها أو أعد تشغيل الخادم ثم افتح هذه الصفحة من جديد.
            </p>
          </div>
        </div>`;
    }

    function renderLobby() {
      const qrHtml = document.getElementById('qr-template').innerHTML;
      const playerChips = S.players.length
        ? S.players.map(p => `<div class="chip">${escapeHtml(p.name)}</div>`).join('')
        : `<div class="chip" style="opacity:.6">في انتظار اللاعبين…</div>`;
      app.innerHTML = `
        <div class="host">
          <header class="host-header">
            <div class="logo"><strong>${escapeHtml(S.title)}</strong></div>
            <div class="game-code">
              <span class="label">رمز اللعبة</span>
              <span class="code">${escapeHtml(S.code)}</span>
            </div>
          </header>
          <div class="host-main">
            <div class="lobby">
              <div class="lobby-info">
                <h1>${escapeHtml(S.title)}</h1>
                ${S.subtitle ? `<p class="subtitle">${escapeHtml(S.subtitle)}</p>` : ''}
                <div class="players-pill">
                  <span>اللاعبون</span>
                  <span class="count">${S.players.length}</span>
                </div>
                <div class="player-list">${playerChips}</div>
                <div class="lobby-cta">
                  <button class="btn btn-primary" id="btn-start" ${S.players.length === 0 ? 'disabled' : ''}>▶ ابدأ اللعبة</button>
                </div>
                <div class="url">أو افتح يدويًا: <strong>${escapeHtml(window.location.origin)}</strong></div>
              </div>
              <div class="lobby-qr">
                <div class="frame">${qrHtml}</div>
                <div class="caption">امسح الرمز بهاتفك للانضمام</div>
              </div>
            </div>
          </div>
        </div>`;
      document.getElementById('btn-start').onclick = () => send({ type: 'host:start' });
    }

    function renderAsking(opts = {}) {
      const revealed = !!opts.revealed;
      if (!S.currentQ) return;
      const q = S.currentQ;
      const choiceHtml = q.choices.map((c, i) => {
        const cls = ['c-a','c-b','c-c','c-d','c-e','c-f'][i] || 'c-a';
        let stateCls = '';
        if (revealed) {
          if (i === S.correctIndex) stateCls = 'correct';
          else if (S.counts[i] > 0) stateCls = 'wrong';
          else stateCls = 'dim';
        }
        return `
          <div class="choice ${cls} ${stateCls}">
            <span class="glyph">${c.shape || '◆'}</span>
            <span class="label">${escapeHtml(c.text)}</span>
            ${revealed ? `<span class="count">${S.counts[i] || 0}</span>` : ''}
          </div>`;
      }).join('');

      const timerCls = S.remaining <= 5 ? 'warn' : '';
      const overlay = revealed ? `
        <div class="overlay">
          <div class="card">
            <h2>${S.correctIndex === q.choices.findIndex(c => c.text === S.currentQ.choices[S.correctIndex].text) ? '✓ الإجابة الصحيحة' : 'الإجابة الصحيحة'}</h2>
            <div class="lobby-cta" style="justify-content:center">
              <button class="btn btn-primary" id="btn-next">${S.currentQ.index === S.currentQ.total - 1 ? 'النتائج النهائية' : 'النتائج المؤقتة ▶'}</button>
            </div>
          </div>
        </div>` : '';

      app.innerHTML = `
        <div class="host">
          <div class="question">
            <div class="question-head">
              <div class="q-index">${q.index + 1} / ${q.total}</div>
              <div class="q-text">${escapeHtml(q.question)}</div>
              <div class="timer ${timerCls}">${S.remaining}</div>
            </div>
            <div class="choices">${choiceHtml}</div>
            <div class="question-foot">
              <div>أجاب <span class="answered">${S.answeredCount}</span> من ${S.players.length} لاعب</div>
              <div>${revealed ? 'اضغط للمتابعة' : 'بانتظار الإجابات…'}</div>
            </div>
          </div>
          ${overlay}
        </div>`;
      if (revealed) {
        const btn = document.getElementById('btn-next');
        if (btn) btn.onclick = () => send({ type: 'host:next' });
      } else {
        // Resume ticker for live countdown
        startTicker();
      }
    }

    function updateTimer() {
      const t = app.querySelector('.timer');
      if (!t) return;
      t.textContent = S.remaining;
      t.classList.toggle('warn', S.remaining <= 5);
    }

    function renderLeaderboard() {
      const top = (S.topPlayers || []).slice(0, 5);
      const rows = top.map((p, i) => {
        const cls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
        return `<div class="lb-row ${cls}">
          <div class="rank">${i + 1}</div>
          <div>${escapeHtml(p.name)}</div>
          <div class="score">${p.score.toLocaleString('en-US')}</div>
        </div>`;
      }).join('');
      const isLast = S.currentQ && S.currentQ.index === S.currentQ.total - 1;
      app.innerHTML = `
        <div class="host">
          <div class="overlay" style="position:relative; inset:auto; padding:0; background:transparent; backdrop-filter:none;">
            <div class="card">
              <h2>النتائج المؤقتة</h2>
              <div class="leaderboard">${rows || '<div class="connecting">لا يوجد لاعبون</div>'}</div>
              <div class="lobby-cta" style="justify-content:center">
                <button class="btn btn-primary" id="btn-next">${isLast ? '🏆 النتائج النهائية' : 'السؤال التالي ▶'}</button>
              </div>
            </div>
          </div>
        </div>`;
      const btn = document.getElementById('btn-next');
      if (btn) btn.onclick = () => send({ type: 'host:next' });
    }

    function renderEnd() {
      const all = S.finalPlayers || [];
      const top3 = all.slice(0, 3);
      const rest = all.slice(3);
      // Confetti — 80 pieces, randomized colors, sizes, animation delays
      const confettiColors = ['#E21B3C','#1368CE','#D89E00','#26890C','#ffffff','#FF8C00','#864CBF'];
      const confettiHtml = `<div class="confetti">${
        Array.from({ length: 90 }, () => {
          const left = Math.random() * 100;
          const dur = 3 + Math.random() * 4;          // 3-7s fall time
          const delay = Math.random() * 5;             // stagger
          const color = confettiColors[Math.floor(Math.random() * confettiColors.length)];
          const w = 0.6 + Math.random() * 1.4;         // 0.6-2vmin wide
          const h = 1.0 + Math.random() * 2.0;         // 1-3vmin tall
          const rot = Math.random() * 360;
          return `<i style="left:${left}%;width:${w}vmin;height:${h}vmin;background:${color};animation-duration:${dur}s;animation-delay:-${delay}s;transform:rotate(${rot}deg)"></i>`;
        }).join('')
      }</div>`;
      // 2-1-3 podium layout: 2nd on the LEFT, 1st in the CENTER, 3rd on the RIGHT.
      const podiumHtml = `
        <div class="podium">
          ${podiumStep(top3[1], 'silver', 2)}
          ${podiumStep(top3[0], 'gold', 1)}
          ${podiumStep(top3[2], 'bronze', 3)}
        </div>`;
      const restHtml = rest.length ? `<div class="podium-rest">${rest.map((p, i) => `
        <div class="lb-row">
          <div class="rank">${i + 4}</div>
          <div>${escapeHtml(p.name)}</div>
          <div class="score">${p.score.toLocaleString('en-US')}</div>
        </div>`).join('')}</div>` : '';
      app.innerHTML = `
        <div class="end-screen">
          ${confettiHtml}
          <h2>🏆 النتائج النهائية</h2>
          ${podiumHtml}
          ${restHtml}
          <div class="end-cta">
            <button class="btn btn-success" id="btn-restart">🔄 لعبة جديدة</button>
          </div>
        </div>`;
      const btn = document.getElementById('btn-restart');
      if (btn) btn.onclick = () => {
        S.finalPlayers = null;
        S.topPlayers = null;
        S.currentQ = null;
        send({ type: 'host:restart' });
      };
    }
    function podiumStep(p, cls, place) {
      if (!p) return `<div class="step ${cls}" style="opacity:0.3"><div class="plinth ${cls}">${place}</div></div>`;
      const initial = (p.name || '?').trim().charAt(0);
      return `
        <div class="step ${cls}">
          <div class="avatar">${escapeHtml(initial)}</div>
          <div class="name">${escapeHtml(p.name)}</div>
          <div class="score">${p.score.toLocaleString('en-US')}</div>
          <div class="plinth ${cls}">${place}</div>
        </div>`;
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // ── Boot ────────────────────────────────────────────────────────────────
    connect();
  </script>
</body>
</html>
