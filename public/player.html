<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>لعبة المعلومات</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="/static/theme.js"></script>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎯%3C/text%3E%3C/svg%3E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0b0820">
</head>
<body>
  <div id="app" class="player"></div>

  <script>
    'use strict';

    // ── State ───────────────────────────────────────────────────────────────
    const S = {
      phase: 'join',          // join | lobby | asking | answered | reveal | leaderboard | end | error | reconnecting | kicked | demo
      code: '{{INITIAL_CODE}}',
      name: localStorage.getItem('trivia_name') || '',
      kickReason: null,       // 'kicked' (default) | 'session_ended'
      showQA: true,           // Kahoot "Show questions on devices" mode — ON by default
      players: [],
      currentQ: null,
      myChoice: -1,
      myScore: 0,
      myRank: 0,
      lastResult: null,       // {correct, points, total, correctIndex}
      topPlayers: [],
      finalPlayers: [],
      error: '',
      remaining: 0,
    };

    // ── WebSocket ───────────────────────────────────────────────────────────
    let ws = null;
    let wsRetries = 0;
    let wsStopped = false;   // set true when the player is kicked or
                             // explicitly leaves — prevents onclose from
                             // auto-reconnecting and clobbering the UI.
    // Vercel's static deployment can't run a WebSocket, so we render a
    // "demo" banner only on vercel.app. For any other host (Railway,
    // localhost, tunnel, …) we keep reconnecting forever with exponential
    // backoff — a flaky network or a server redeploy shouldn't kick the
    // player out to a marketing page.
    const isVercel = /vercel\.app$/.test(location.hostname);
    let reconnectTimer = null;
    function backoffDelay() {
      // 1s, 2s, 4s, 8s … capped at 15s
      return Math.min(15000, 1000 * Math.pow(2, Math.min(wsRetries, 4)));
    }
    function connect() {
      wsStopped = false;
      if (isVercel) { S.phase = 'demo'; render(); return; }
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      try {
        ws = new WebSocket(`${proto}://${location.host}`);
      } catch (e) {
        scheduleReconnect();
        return;
      }
      ws.onopen = () => {
        // Reset retry counter on every successful open so brief hiccups
        // don't accumulate toward a fake "give up" state.
        wsRetries = 0;
        if (S.phase !== 'join' && S.name && S.code) {
          send({ type: 'player:join', name: S.name, code: S.code });
        }
        render();
      };
      ws.onmessage = (e) => {
        let m; try { m = JSON.parse(e.data); } catch (_) { return; }
        handle(m);
      };
      ws.onclose = () => { if (!wsStopped) scheduleReconnect(); };
      ws.onerror = () => { /* onclose will follow — reconnect is handled there */ };
    }
    function scheduleReconnect() {
      wsRetries++;
      if (S.phase !== 'join' && S.phase !== 'demo' && S.phase !== 'kicked') S.phase = 'reconnecting';
      render();
      if (reconnectTimer) clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(connect, backoffDelay());
    }

    function renderDemoBanner() {
      app.innerHTML = `
        <div class="player" style="justify-content:center; gap:4vmin;">
          <div style="font-size:14vmin">🎯</div>
          <h1 style="font-size:7vmin; color:#1a1a1a">لعبة المعلومات</h1>
          <p style="color:#555; max-width:80%; font-size:4vmin; line-height:1.6">
            هذه نسخة العرض. اللعب الجماعي متاح فقط عند تشغيل الخادم محلياً.
          </p>
          <div style="background:#f2f2f2; border-radius:1rem; padding:3vmin 4vmin; width:100%; direction:ltr; text-align:left; font-family:ui-monospace,monospace; font-size:3.4vmin; color:#1a1a1a">
            <div style="color:#46178F; font-weight:700; margin-bottom:1.5vmin">Quick start</div>
            <div>git clone &lt;repo&gt;</div>
            <div>cd arabic-trivia</div>
            <div>npm install</div>
            <div>npm start</div>
          </div>
          <a href="https://github.com/midobk/arabic-trivia" target="_blank" rel="noopener"
             style="display:inline-block; background:#1a1a1a; color:#fff; padding:3.5vmin 6vmin; border-radius:1rem; font-weight:700; font-size:4vmin; text-decoration:none; margin-top:2vmin;">
            View on GitHub ↗
          </a>
        </div>`;
    }
    function send(msg) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg)); }

    function handle(m) {
      switch (m.type) {
        case 'player:joined': {
          S.code = m.code;
          S.phase = 'lobby';
          S.error = '';
          render();
          break;
        }
        case 'player:error': {
          S.error = ({
            invalid_code: 'رمز اللعبة غير صحيح. تحقق من الشاشة الكبيرة.',
            invalid_name: 'الرجاء إدخال اسم صحيح.',
            game_started: 'بدأت اللعبة بالفعل. انتظر الجولة التالية.',
          })[m.reason] || 'حدث خطأ. حاول مرة أخرى.';
          if (m.reason === 'game_started') S.phase = 'error_game_started';
          render();
          break;
        }
        case 'question': {
          S.phase = 'asking';
          S.currentQ = m;
          S.myChoice = -1;
          S.remaining = m.duration;
          S.lastResult = null;
          render();
          break;
        }
        case 'player:changed': {
          // Another player changed their answer; not used on the chooser's own
          // screen (we already updated locally). Kept here for future
          // "live vote" features.
          break;
        }
        case 'tick': {
          S.remaining = m.remaining;
          updateTimer();
          break;
        }
        case 'answer:result': {
          S.lastResult = m;
          S.myScore = m.total;
          S.phase = 'answered';
          render();
          break;
        }
        case 'reveal': {
          S.phase = 'reveal';
          if (S.lastResult) S.lastResult.correctIndex = m.correctIndex;
          render();
          break;
        }
        case 'leaderboard': {
          S.phase = 'leaderboard';
          S.topPlayers = m.players;
          const me = m.players.findIndex(p => p.name === S.name);
          S.myRank = me >= 0 ? me + 1 : 0;
          render();
          break;
        }
        case 'game:end': {
          S.phase = 'end';
          S.finalPlayers = m.players;
          const me = m.players.findIndex(p => p.name === S.name);
          S.myRank = me >= 0 ? me + 1 : 0;
          render();
          break;
        }
        case 'game:reset': {
          S.phase = 'lobby';
          S.players = [];
          S.currentQ = null;
          S.lastResult = null;
          S.topPlayers = [];
          S.finalPlayers = [];
          S.code = m.code || S.code;
          S.error = '';
          render();
          break;
        }
        case 'player:kicked': {
          // Host removed us from the current game. Close the socket (the
          // onclose handler will see wsStopped=true and skip auto-reconnect)
          // and show a "you've been kicked" screen with a way to rejoin.
          // `reason` is optional: 'session_ended' = host cleared the lobby.
          wsStopped = true;
          S.phase = 'kicked';
          S.kickReason = m.reason || 'kicked';
          S.name = '';
          if (ws && ws.readyState <= 1) { try { ws.close(); } catch (_) {} }
          render();
          break;
        }
      }
    }

    // ── Render ──────────────────────────────────────────────────────────────
    const app = document.getElementById('app');

    function render() {
      switch (S.phase) {
        case 'join':              return renderJoin();
        case 'lobby':             return renderLobby();
        case 'asking':            return renderAsking();
        case 'answered':          return renderAnswered();
        case 'reveal':            return renderReveal();
        case 'leaderboard':       return renderLeaderboard();
        case 'end':               return renderEnd();
        case 'error_game_started':return renderErrorStarted();
        case 'reconnecting':      return renderReconnecting();
        case 'kicked':            return renderKicked();
        case 'demo':              return renderDemoBanner();
        default:                  return renderJoin();
      }
    }

    function renderJoin() {
      app.innerHTML = `
        <div class="player" style="justify-content:center">
          <div class="theme-toggle" role="group" aria-label="المظهر">
            <button data-theme-btn="light" title="فاتح" aria-label="المظهر الفاتح">☀</button>
            <button data-theme-btn="dark"  title="داكن"  aria-label="المظهر الداكن">🌙</button>
            <button data-theme-btn="system" title="تلقائي" aria-label="مظهر النظام">◐</button>
          </div>
          <h1>🎯 انضم للعبة</h1>
          <p>أدخل اسمك ورمز اللعبة الظاهر على الشاشة الكبيرة.</p>
          <div class="field">
            <label for="name">الاسم</label>
            <input id="name" type="text" inputmode="text" maxlength="20" autocomplete="off" placeholder="اكتب اسمك" value="${escapeHtml(S.name)}">
          </div>
          <div class="field">
            <label for="code">رمز اللعبة</label>
            <input id="code" class="code" type="text" inputmode="latin" maxlength="4" autocomplete="off" autocapitalize="characters" placeholder="XXXX" value="${escapeHtml((S.code || '').toUpperCase())}">
          </div>
          <div class="error-msg" id="err">${escapeHtml(S.error || '')}</div>
          <button class="btn btn-primary" id="btn-join">انضم 🚀</button>
        </div>`;
      const nameEl = document.getElementById('name');
      const codeEl = document.getElementById('code');
      nameEl.focus();
      codeEl.addEventListener('input', () => { codeEl.value = codeEl.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 4); S.error = ''; });
      nameEl.addEventListener('input', () => { S.error = ''; });
      document.getElementById('btn-join').onclick = submitJoin;
      [nameEl, codeEl].forEach(el => el.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitJoin(); }));
    }
    function submitJoin() {
      const name = document.getElementById('name').value.trim();
      const code = document.getElementById('code').value.trim().toUpperCase();
      if (!name) { S.error = 'الرجاء إدخال اسمك.'; render(); return; }
      if (code.length !== 4) { S.error = 'الرمز يجب أن يكون 4 أحرف.'; render(); return; }
      S.name = name;
      S.code = code;
      localStorage.setItem('trivia_name', name);
      S.phase = 'joining';
      S.error = '';
      // Give immediate click feedback — disable the button + change its text
      // so a slow socket doesn't look like the click did nothing. Avoids the
      // S.phase = 'joining' render gap (which has no render handler and would
      // re-render the form). C5 fix.
      const btn = document.getElementById('btn-join');
      if (btn) { btn.disabled = true; btn.textContent = '…'; }
      // Wait for open socket
      if (ws && ws.readyState === 1) {
        send({ type: 'player:join', name, code });
      } else {
        // Buffer until connected
        const onopen = () => { ws.removeEventListener('open', onopen); send({ type: 'player:join', name, code }); };
        ws.addEventListener('open', onopen);
      }
    }
    function renderReconnecting() {
      app.innerHTML = `<div class="player" style="justify-content:center; text-align:center">
        <div class="pulse" style="background:var(--ink-mute)"></div>
        <h1>جاري إعادة الاتصال…</h1>
      </div>`;
    }
    function renderKicked() {
      // The host removed us from the current game. Offer a way back to the
      // join screen so the player can re-enter the same game (or another).
      const isSessionEnd = S.kickReason === 'session_ended';
      app.innerHTML = `<div class="player" style="justify-content:center; gap:4vmin; text-align:center">
        <div style="font-size:18vmin; color:${isSessionEnd ? 'var(--ink-dim)' : 'var(--c-a)'}">${isSessionEnd ? '🔌' : '🚫'}</div>
        <h1 style="color:var(--page-fg)">${isSessionEnd ? 'انتهت الجلسة' : 'تم طردك من اللعبة'}</h1>
        <p style="max-width:80%; color:var(--page-fg-dim)">
          ${isSessionEnd
            ? 'أنهى المضيف الجلسة. يمكنك الانضمام إلى لعبة جديدة من البداية.'
            : 'أزالك المضيف من هذه اللعبة. يمكنك الانضمام مرة أخرى إذا سمح لك.'}
        </p>
        <button class="btn btn-primary" id="btn-back-join" style="margin-top:2vmin">العودة إلى شاشة الانضمام</button>
      </div>`;
      document.getElementById('btn-back-join').onclick = () => {
        S.phase = 'join';
        S.error = '';
        S.name = '';
        S.kickReason = null;
        try { localStorage.removeItem('trivia_name'); } catch (_) {}
        // Reconnect so the player can rejoin the game.
        if (ws && ws.readyState <= 1) { try { ws.close(); } catch (_) {} }
        wsRetries = 0;
        render();
        connect();
      };
    }
    function renderErrorStarted() {
      app.innerHTML = `<div class="player" style="justify-content:center; text-align:center; gap:3vmin">
        <h1>بدأت اللعبة بالفعل</h1>
        <p>اطلب من المضيف بدء لعبة جديدة، ثم انضم مرة أخرى.</p>
        <button class="btn btn-secondary" id="btn-back">العودة</button>
      </div>`;
      document.getElementById('btn-back').onclick = () => { S.phase = 'join'; S.error = ''; render(); };
    }

    function renderLobby() {
      app.innerHTML = `
        <div class="player-lobby">
          <div class="pulse"></div>
          <div class="big">أهلاً ${escapeHtml(S.name)} 👋</div>
          <div class="small">في انتظار بدء اللعبة على الشاشة الكبيرة…</div>
        </div>`;
    }

    function renderAsking() {
      const q = S.currentQ;
      if (!q) return;
      const buttons = q.choices.map((c, i) => {
        const cls = ['pa','pb','pc','pd'][i] || 'pa';
        return `<button class="pchoice ${cls}" data-i="${i}">
          <span class="glyph">${c.shape || '◆'}</span>
          ${S.showQA ? `<span class="label">${escapeHtml(c.text)}</span>` : ''}
        </button>`;
      }).join('');
      const pct = q.duration > 0 ? (S.remaining / q.duration) * 100 : 0;
      app.innerHTML = `
        <div class="player-question">
          <div class="corner-top">
            <div class="pin">PIN: ${escapeHtml(S.code)}</div>
            <div class="counter">${q.index + 1} of ${q.total}</div>
          </div>
          ${S.showQA ? `<div class="q-text">${escapeHtml(q.question)}</div>` : ''}
          <div class="player-choices">${buttons}</div>
          <div class="player-progress"><div class="fill" id="prog" style="width:${pct}%"></div></div>
          <div class="corner-bottom">
            <div class="name">${escapeHtml(S.name)}</div>
            <div class="score" id="my-score">${S.myScore || 0}</div>
          </div>
        </div>`;
      app.querySelectorAll('.pchoice').forEach(btn => {
        btn.onclick = () => {
          const i = parseInt(btn.dataset.i, 10);
          if (S.myChoice === i) return;
          S.myChoice = i;
          app.querySelectorAll('.pchoice').forEach(b => b.classList.remove('picked'));
          btn.classList.add('picked');
          send({ type: 'player:answer', choice: i });
        };
      });
      // Local countdown ticking (UI only)
      if (S._tick) clearInterval(S._tick);
      S._tick = setInterval(() => {
        S.remaining = Math.max(0, S.remaining - 1);
        const prog = document.getElementById('prog');
        if (prog) {
          const p = q.duration > 0 ? (S.remaining / q.duration) * 100 : 0;
          prog.style.width = p + '%';
          prog.classList.toggle('warn', S.remaining <= 5);
        }
        if (S.remaining <= 0) clearInterval(S._tick);
      }, 1000);
    }
    function updateTimer() {
      const prog = document.getElementById('prog');
      if (!prog) return;
      const dur = S.currentQ?.duration || 1;
      prog.style.width = Math.max(0, (S.remaining / dur) * 100) + '%';
      prog.classList.toggle('warn', S.remaining <= 5);
    }

    function renderAnswered() {
      const r = S.lastResult || {};
      const correct = r.correct === true;
      const missed  = r.correct === false && r.status === 'no_answer';
      const icon = correct ? '✓' : (missed ? '⏱' : '✗');
      const iconCls = correct ? 'ok' : (missed ? 'miss' : 'bad');
      const headline = correct ? 'إجابة صحيحة!' : (missed ? 'انتهى الوقت' : 'إجابة خاطئة');
      app.innerHTML = `
        <div class="player-result">
          <div class="icon ${iconCls}">${icon}</div>
          <h2>${headline}</h2>
          ${correct ? `<div class="points">+${(r.points || 0).toLocaleString('en-US')}</div>` : ''}
          <div class="sub">المجموع: ${(r.total || 0).toLocaleString('en-US')}</div>
        </div>`;
    }

    function renderReveal() {
      const q = S.currentQ;
      const r = S.lastResult || {};
      const correctIdx = (r.correctIndex != null) ? r.correctIndex : (q ? q.choices.findIndex(c => false) : -1);
      if (!q) return renderAnswered();
      const buttons = q.choices.map((c, i) => {
        const cls = ['pa','pb','pc','pd'][i] || 'pa';
        let state = '';
        if (i === correctIdx) state = 'correct';
        else if (i === S.myChoice) state = 'wrong';
        else state = 'dim';
        return `<div class="pchoice ${cls} ${state} disabled">
          <span class="glyph">${c.shape || '◆'}</span>
          ${S.showQA ? `<span class="label">${escapeHtml(c.text)}</span>` : ''}
        </div>`;
      }).join('');
      app.innerHTML = `
        <div class="player-question">
          <div class="corner-top">
            <div class="pin">PIN: ${escapeHtml(S.code)}</div>
            <div class="counter">${q.index + 1} of ${q.total}</div>
          </div>
          <div class="player-choices">${buttons}</div>
          <div class="player-progress"><div class="fill" style="width:0%"></div></div>
          <div class="corner-bottom">
            <div class="name">${escapeHtml(S.name)}</div>
            <div class="score" id="my-score">${S.myScore || 0}</div>
          </div>
        </div>`;
    }

    function renderLeaderboard() {
      const list = S.topPlayers || [];
      const rows = list.slice(0, 5).map((p, i) => {
        const me = p.name === S.name ? 'me' : '';
        const rank = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
        return `<div class="lb-row ${me}">
          <div class="rank">${rank}</div>
          <div>${escapeHtml(p.name)}</div>
          <div class="score">${p.score.toLocaleString('en-US')}</div>
        </div>`;
      }).join('');
      app.innerHTML = `
        <div class="player-leaderboard">
          <h2>النتائج المؤقتة</h2>
          ${rows}
          ${S.myRank ? `<div class="sub" style="text-align:center">ترتيبك الحالي: <strong>${S.myRank}</strong></div>` : ''}
        </div>`;
    }

    function renderEnd() {
      const all = S.finalPlayers || [];
      const top3 = all.slice(0, 3);
      const podiumHtml = `
        <div class="podium">
          ${podiumStep(top3[1], 'silver', 2)}
          ${podiumStep(top3[0], 'gold', 1)}
          ${podiumStep(top3[2], 'bronze', 3)}
        </div>`;
      const me = all.find(p => p.name === S.name);
      const myRank = all.findIndex(p => p.name === S.name) + 1;
      // player-end wrapper gets the brand purple background so the white
      // .podium .name text (designed for the host's purple end-screen) stays
      // readable. C1 fix.
      app.innerHTML = `
        <div class="player player-end">
          <h1>🏆 انتهت اللعبة</h1>
          ${podiumHtml}
          ${me ? `<div class="sub" style="text-align:center">ترتيبك: <strong>${myRank}</strong> بـ <strong>${me.score.toLocaleString('en-US')}</strong> نقطة</div>` : ''}
          <button class="btn btn-primary" id="btn-back-join" style="margin-top:3vmin">العودة إلى شاشة الانضمام</button>
        </div>`;
      document.getElementById('btn-back-join').onclick = () => {
        S.phase = 'join';
        S.error = '';
        S.name = '';
        S.kickReason = null;
        try { localStorage.removeItem('trivia_name'); } catch (_) {}
        if (ws && ws.readyState <= 1) { try { ws.close(); } catch (_) {} }
        wsRetries = 0;
        render();
        connect();
      };
    }
    function podiumStep(p, cls, place) {
      if (!p) return `<div class="step ${cls}" style="opacity:0.3"><div class="plinth ${cls}">${place}</div></div>`;
      const initial = (p.name || '?').trim().charAt(0);
      return `
        <div class="step ${cls}">
          <div class="avatar">${escapeHtml(initial)}</div>
          <div class="name">${escapeHtml(p.name)}</div>
          <div class="score">${p.score.toLocaleString('en-US')}</div>
          <div class="plinth ${cls}">${place}</div>
        </div>`;
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // ── Theme toggle ───────────────────────────────────────────────────────
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-theme-btn]');
      if (!btn) return;
      window.TriviaTheme && window.TriviaTheme.set(btn.dataset.themeBtn);
    });
    function syncThemeButtons() {
      const choice = (window.TriviaTheme && window.TriviaTheme.get()) || 'system';
      document.querySelectorAll('[data-theme-btn]').forEach(b => {
        b.setAttribute('aria-pressed', b.dataset.themeBtn === choice ? 'true' : 'false');
      });
    }
    document.addEventListener('trivia:themechange', syncThemeButtons);
    const origRender = render;
    render = function () { origRender(); syncThemeButtons(); };

    // ── Boot ────────────────────────────────────────────────────────────────
    connect();
    render();
  </script>
</body>
</html>
